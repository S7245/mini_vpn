[package]
name = "mini_vpn"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
chacha20poly1305 = "0.10"
rand = "0.8"
tokio-util = { version = "0.7", features = ["codec"] }
bytes = "1.0"
futures = "0.3"

# 阶段七：真 TLS 流量伪装 (TLS Masquerading) 🎭。
tokio-rustls = "0.24"
rustls = "0.21"
rustls-pemfile = "1.0" # 用于读取证书文件